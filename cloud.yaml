id: repositorio-recursos
environments:
  production:
    build:
      - 'if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate; fi'
      - 'sed -i "/SANCTUM_STATEFUL_DOMAINS/d" .env || true'
      - 'composer install --no-interaction --optimize-autoloader'
      - 'npm install'
      - 'npm run build'
      - 'php artisan storage:link'
    deploy:
      - 'php artisan migrate --force'
      - 'php artisan db:seed --force'
    runtime: php-8.2

database:
  production:
    type: mysql
    engine: mysql
    version: 8.0
    storage: 5

storage:
  production:
    - disk: public
      bucket: public-storage
      type: local
