services:
  - type: web
    name: repositorio-educativo
    runtime: docker
    repo: https://github.com/Vic-developers/repositorio-recursos
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: repositorio-educativo
          property: url
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: repositorio-db
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: repositorio
      - key: DB_USERNAME
        value: repositorio_user
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: repositorio-db
          property: password
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: public

  - type: pserv
    name: repositorio-db
    plan: starter
    env: mysql
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
