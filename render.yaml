services:
  - type: web
    name: repositorio-educativo
    runtime: docker
    repo: https://github.com/Vic-developers/repositorio-recursos
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://repositorio-educativo.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: repositorio-db
          property: hostport
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: repositorio
      - key: DB_USERNAME
        value: repositorio_user
      - key: DB_PASSWORD
        value: repositorio_pass
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: public

  - type: pserv
    name: repositorio-db
    runtime: image
    image:
      url: mysql:8.0
    plan: starter
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root_password
      - key: MYSQL_DATABASE
        value: repositorio
      - key: MYSQL_USER
        value: repositorio_user
      - key: MYSQL_PASSWORD
        value: repositorio_pass
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
