events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security headers for iframe embedding (Moodle)
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    upstream php-backend {
        server app:9000;
    }

    server {
        listen 80;
        server_name _;
        root /var/www/public;
        index index.php;

        # SPA routes - serve index.html for non-file URIs
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # API routes - proxy to PHP-FPM
        location ~ ^/api/ {
            try_files $uri /index.php?$query_string;
        }

        # SCORM content - serve static files from storage
        location /scorm-content/ {
            alias /var/www/storage/app/public/scorm/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Player routes
        location /player/ {
            try_files $uri /index.php?$query_string;
        }

        # Embed routes (public, no auth)
        location /embed/ {
            try_files $uri /index.php?$query_string;
        }

        # Storage files
        location /storage/ {
            alias /var/www/storage/app/public/;
            expires 30d;
        }

        # Static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # PHP processing
        location ~ \.php$ {
            fastcgi_pass php-backend;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
        }
    }
}
